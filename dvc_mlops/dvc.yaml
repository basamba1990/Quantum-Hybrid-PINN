
stages:
  prepare:
    cmd: python3 dvc_mlops/src/prepare.py --case_path data/raw/simulations --output_dir data/processed --scenarios all
    deps:
      - dvc_mlops/src/prepare.py
      - apps/api/repit_integration/industrial_loader.py
    outs:
      - data/processed/train.npz
      - data/processed/val.npz
      - data/processed/train_kalman.npz
      - data/processed/val_kalman.npz
      - data/processed/metadata.json

  train_fno:
    cmd: python3 dvc_mlops/src/train_fno.py --train_data_path data/processed/train.npz --val_data_path data/processed/val.npz --model_output_path models/fno_model.pt --epochs ${epochs}
    deps:
      - dvc_mlops/src/train_fno.py
      - data/processed/train.npz
      - data/processed/val.npz
    params:
      - epochs
    outs:
      - models/fno_model.pt

  train_pinn:
    cmd: python3 dvc_mlops/src/train_pinn.py --epochs ${pinn_epochs} --learning_rate ${pinn_learning_rate} --N_pde ${pinn_N_pde} --model_output_path models/pinn_model.pt --enable_ood_detection --enable_mc_dropout
    deps:
      - dvc_mlops/src/train_pinn.py
      - apps/api/hydrogen_pinn_v8.py
    params:
      - pinn_epochs
      - pinn_learning_rate
      - pinn_N_pde
    outs:
      - models/pinn_model.pt
      - models/ood_stats.npz

  train_kalman:
    cmd: python3 dvc_mlops/src/train_kalman.py --train_data_path data/processed/train_kalman.npz --val_data_path data/processed/val_kalman.npz --model_output_path models/deep_kalman_filter.pt --epochs ${kalman_epochs} --lr ${kalman_learning_rate}
    deps:
      - dvc_mlops/src/train_kalman.py
      - apps/api/deep_kalman_filter.py
      - data/processed/train_kalman.npz
    params:
      - kalman_epochs
      - kalman_learning_rate
    outs:
      - models/deep_kalman_filter.pt

  evaluate:
    cmd: python3 dvc_mlops/src/evaluate.py --pinn_model_path models/pinn_model.pt --fno_model_path models/fno_model.pt --kalman_model_path models/deep_kalman_filter.pt --test_data_path data/processed/val.npz
    deps:
      - dvc_mlops/src/evaluate.py
      - models/pinn_model.pt
      - models/fno_model.pt
      - models/deep_kalman_filter.pt
      - data/processed/val.npz
    metrics:
      - metrics/eval_metrics.json:
          cache: false
