
stages:
  # ============================================================================
  # PHASE 1 : Préparation des données pour tous les scénarios industriels
  # ============================================================================
  prepare:
    cmd: python src/prepare.py --case_path data/raw/simulations --output_dir data/processed --scenarios all
    deps:
      - data/raw/simulations
      - src/prepare.py
    outs:
      - data/processed/train.npz
      - data/processed/val.npz
      - data/processed/metadata.json
      - data/processed/scenarios_manifest.json
    metrics:
      - metrics/prepare_metrics.json

  # ============================================================================
  # PHASE 2 : Entraînement FNO (Fourier Neural Operator) multi-scénarios
  # ============================================================================
  train_fno:
    cmd: python src/train_fno.py 
      --train_data_path data/processed/train.npz 
      --val_data_path data/processed/val.npz 
      --model_output_path models/fno_model.pt 
      --epochs ${epochs} 
      --learning_rate ${learning_rate} 
      --n_modes ${n_modes} 
      --width ${width} 
      --in_channels ${in_channels} 
      --out_channels ${out_channels}
      --scenarios ${fno_scenarios}
      --batch_size ${fno_batch_size}
      --early_stopping_patience ${early_stopping_patience}
    deps:
      - data/processed/train.npz
      - data/processed/val.npz
      - src/train_fno.py
    params:
      - epochs
      - learning_rate
      - n_modes
      - width
      - in_channels
      - out_channels
      - fno_scenarios
      - fno_batch_size
      - early_stopping_patience
    outs:
      - models/fno_model.pt
      - models/fno_checkpoint_best.pt
    metrics:
      - metrics/fno_metrics.json:
          cache: false

  # ============================================================================
  # PHASE 3 : Entraînement PINN V8 (Physics-Informed Neural Network)
  # ============================================================================
  train_pinn:
    cmd: python src/train_pinn.py 
      --epochs ${pinn_epochs} 
      --learning_rate ${pinn_learning_rate} 
      --N_pde ${pinn_N_pde} 
      --model_output_path ${pinn_model_path} 
      --layers "${pinn_layers}"
      --scenarios ${pinn_scenarios}
      --fluid_type ${fluid_type}
      --enable_mc_dropout ${enable_mc_dropout}
      --enable_ood_detection ${enable_ood_detection}
      --residual_threshold ${residual_threshold}
    deps:
      - src/train_pinn.py
      - data/processed/train.npz
    params:
      - pinn_epochs
      - pinn_learning_rate
      - pinn_N_pde
      - pinn_layers
      - pinn_model_path
      - pinn_scenarios
      - fluid_type
      - enable_mc_dropout
      - enable_ood_detection
      - residual_threshold
    outs:
      - models/pinn_model.pt
      - models/pinn_checkpoint_best.pt
      - models/pinn_scaler.pkl
    metrics:
      - metrics/pinn_metrics.json:
          cache: false

  # ============================================================================
  # PHASE 4 : Entraînement du Deep Kalman Filter
  # ============================================================================
  train_kalman:
    cmd: python src/train_kalman.py 
      --train_data_path data/processed/train.npz 
      --model_output_path models/deep_kalman_filter.pt 
      --state_dim ${kalman_state_dim}
      --observation_dim ${kalman_observation_dim}
      --hidden_dim ${kalman_hidden_dim}
      --epochs ${kalman_epochs}
      --learning_rate ${kalman_learning_rate}
    deps:
      - data/processed/train.npz
      - src/train_kalman.py
    params:
      - kalman_state_dim
      - kalman_observation_dim
      - kalman_hidden_dim
      - kalman_epochs
      - kalman_learning_rate
    outs:
      - models/deep_kalman_filter.pt
    metrics:
      - metrics/kalman_metrics.json:
          cache: false

  # ============================================================================
  # PHASE 5 : Évaluation et Validation Croisée
  # ============================================================================
  evaluate:
    cmd: python src/evaluate.py 
      --pinn_model_path ${pinn_model_path} 
      --fno_model_path ${fno_model_path}
      --kalman_model_path models/deep_kalman_filter.pt
      --test_data_path ${eval_test_data} 
      --metrics_output_path ${eval_metrics_path}
      --scenarios ${eval_scenarios}
      --validation_type ${validation_type}
    deps:
      - ${pinn_model_path}
      - ${fno_model_path}
      - models/deep_kalman_filter.pt
      - ${eval_test_data}
      - src/evaluate.py
    params:
      - pinn_model_path
      - fno_model_path
      - eval_test_data
      - eval_metrics_path
      - eval_scenarios
      - validation_type
    metrics:
      - metrics/eval_metrics.json:
          cache: false
      - metrics/residuals_analysis.json:
          cache: false
      - metrics/scenario_performance.json:
          cache: false

  # ============================================================================
  # PHASE 6 : Génération de Rapports et Versioning
  # ============================================================================
  report:
    cmd: python src/generate_report.py 
      --metrics_dir metrics 
      --output_path reports/mlops_report.md
      --model_version ${model_version}
      --commit_hash ${commit_hash}
    deps:
      - metrics/pinn_metrics.json
      - metrics/fno_metrics.json
      - metrics/kalman_metrics.json
      - metrics/eval_metrics.json
      - src/generate_report.py
    outs:
      - reports/mlops_report.md
      - reports/model_registry.json
