
# ============================================================================
# CONFIGURATION GÉNÉRALE
# ============================================================================
model_version: "8.1.0"
commit_hash: "auto"

# ============================================================================
# PHASE 1 : PRÉPARATION DES DONNÉES
# ============================================================================
prepare:
  scenarios: "H2_PIPELINE,LH2_STORAGE,H2_COMPRESSION_STATION,MINING_INDUSTRIAL_SIM,CRYOGENIC_TRANSPORT,PIPELINE_SAFETY,PORT_ENERGY_OPTIMIZATION,ROCK_ELAST_STRESS"
  train_val_split: 0.8
  test_split: 0.1
  normalize: true

# ============================================================================
# PHASE 2 : ENTRAÎNEMENT FNO
# ============================================================================
epochs: 100
learning_rate: 0.001
n_modes: 12
width: 32
in_channels: 1
out_channels: 1
fno_scenarios_str: "H2_PIPELINE,LH2_STORAGE,CRYOGENIC_TRANSPORT"
fno_batch_size: 32
early_stopping_patience: 20

# ============================================================================
# PHASE 3 : ENTRAÎNEMENT PINN V8
# ============================================================================
pinn_epochs: 5000
pinn_learning_rate: 0.001
pinn_N_pde: 5000
pinn_layers_str: "4,128,128,128,5"
pinn_model_path: "models/pinn_model.pt"
pinn_scenarios_str: "H2_PIPELINE,H2_COMPRESSION_STATION,MINING_INDUSTRIAL_SIM,ROCK_ELAST_STRESS"

# Paramètres physiques
fluid_type: "H2"
enable_mc_dropout: true
enable_ood_detection: true
residual_threshold: 0.01

# ============================================================================
# PHASE 4 : ENTRAÎNEMENT DEEP KALMAN FILTER
# ============================================================================
kalman_state_dim: 5
kalman_observation_dim: 3
kalman_hidden_dim: 64
kalman_epochs: 500
kalman_learning_rate: 0.001

# ============================================================================
# PHASE 5 : ÉVALUATION ET VALIDATION
# ============================================================================
fno_model_path: "models/fno_model.pt"
eval_test_data: "data/processed/val.npz"
eval_metrics_path: "metrics/eval_metrics.json"
eval_scenarios_str: "H2_PIPELINE,LH2_STORAGE,H2_COMPRESSION_STATION,MINING_INDUSTRIAL_SIM"
validation_type: "cross_scenario"
