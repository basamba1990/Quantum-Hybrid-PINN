version: '3.8'

services:
  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=http://localhost:3000,https://quantum-hybrid-pinn-web.vercel.app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: node pinn_queue_system.js
    environment:
      - REDIS_URL=redis://redis:6379
      - H2_INFERENCE_API_URL=http://backend:8000
    depends_on:
      - redis
      - backend

volumes:
  redis_data:
