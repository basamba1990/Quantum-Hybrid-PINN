services:
  - type: web
    name: quantum-hybrid-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    rootDir: apps/backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: BACKEND_SERVICE_URL
        value: https://quantum-hybrid-backend.onrender.com
      - key: IS_API_GATEWAY
        value: "true"

  - type: web
    name: quantum-hybrid-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    rootDir: apps/backend
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: CASES_BASE_PATH
        value: /home/ubuntu/cases
      - key: IS_BACKEND_WORKER
        value: "true"
