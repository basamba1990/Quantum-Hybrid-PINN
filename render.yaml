      - key: PORT
        value: 8080
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MODEL_PATH
        value: models/pinn_model.pt
      - key: NEXT_PUBLIC_API_URL
        value: https://quantum-hybrid-pinn-jdoj.onrender.com
      - key: H2_INFERENCE_API_URL
        value: https://quantum-hybrid-pinn-jdoj.onrender.com
      - key: API_BASE_URL
        value: https://quantum-hybrid-pinn-jdoj.onrender.com
      - key: BACKEND_SERVICE_URL
        value: https://quantum-hybrid-pinn-jdoj.onrender.com
      - key: KEEP_ALIVE_URLS
        value: https://quantum-hybrid-pinn-jdoj.onrender.com/health
      - key: SUPABASE_URL
        value: https://ivhxnaxhgfbiqlhgfkik.supabase.co
      - key: SUPABASE_KEY
        value: votre_cle_anon_ou_service_role_ici
      - key: SUPABASE_BUCKET_NAME
        value: pinn-models
      - key: SUPABASE_MODEL_PATH
        value: pinn_model.pt
