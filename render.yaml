services:
  - type: web
    name: quantum-pinn-api
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r apps/api/requirements.txt
      # Optionnel: DVC pull si les modèles sont sur S3/GCS
      # dvc pull
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker apps/api/main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MODEL_PATH
        value: models/pinn_model.pt
      - key: NEXT_PUBLIC_API_URL
        value: https://quantum-pinn-api-qef2.onrender.com
      - key: H2_INFERENCE_API_URL
        value: https://quantum-pinn-api-qef2.onrender.com
    disk:
      name: model-storage
      mountPath: /data
      sizeGB: 10
